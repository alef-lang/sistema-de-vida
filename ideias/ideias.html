<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <title>Ideias — Sistema de Vida</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #081422;
      --bg2: #0d1b2a;
      --panel: rgba(18, 32, 50, 0.72);
      --panel-solid: #132337;
      --panel-soft: rgba(255,255,255,0.055);
      --card: rgba(20, 34, 52, 0.82);
      --card-hover: rgba(26, 44, 68, 0.94);
      --gold: #d8b85c;
      --gold-light: #ffe08a;
      --gold-dim: rgba(216,184,92,0.18);
      --text: #edf4fb;
      --muted: #96aac0;
      --muted2: #6e849c;
      --blue: #77b7ff;
      --pink: #f7a1d1;
      --green: #75e2c8;
      --purple: #b8a4ff;
      --orange: #ffc36a;
      --red: #ff7d7d;
      --radius: 18px;
      --col-w: 304px;
      --toolbar: rgba(9,20,34,0.96);
      --shadow: 0 18px 42px rgba(0,0,0,0.24);
      --line: rgba(255,255,255,0.075);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: auto;
      background:
        radial-gradient(circle at 12% 8%, rgba(119,183,255,0.18), transparent 26%),
        radial-gradient(circle at 88% 12%, rgba(247,161,209,0.14), transparent 24%),
        radial-gradient(circle at 78% 82%, rgba(117,226,200,0.13), transparent 26%),
        linear-gradient(135deg, #081422 0%, #101f32 46%, #07111e 100%);
    }

    #neural-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .92;
      background:
        radial-gradient(circle at 18% 18%, rgba(119,183,255,0.08), transparent 18%),
        radial-gradient(circle at 72% 22%, rgba(255,224,138,0.07), transparent 20%),
        radial-gradient(circle at 84% 76%, rgba(117,226,200,0.07), transparent 18%),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: auto, auto, auto, 72px 72px, 72px 72px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.95), rgba(0,0,0,.68));
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 28% 36%, rgba(184,164,255,0.06), transparent 28%),
        radial-gradient(circle at 54% 72%, rgba(255,195,106,0.055), transparent 30%);
    }

    #neural-svg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.34;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-width: max-content;
      padding: 0 26px;
      height: 64px;
      background: rgba(8,20,34,0.78);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 35px rgba(0,0,0,0.16);
    }

    .topbar-left, .topbar-actions { display: flex; align-items: center; gap: 12px; }

    .back-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s, transform 0.15s;
    }
    .back-btn:hover { color: var(--gold-light); transform: translateX(-2px); }

    .topbar-title {
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .topbar-title span { color: var(--gold-light); }

    .sync-status {
      min-width: 92px;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: .04em;
      color: var(--muted);
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      white-space: nowrap;
    }
    .sync-status.ok { color: var(--green); border-color: rgba(117,226,200,.22); background: rgba(117,226,200,.07); }
    .sync-status.busy { color: var(--gold-light); border-color: rgba(255,224,138,.24); background: rgba(255,224,138,.07); }
    .sync-status.warn { color: var(--orange); border-color: rgba(255,195,106,.25); background: rgba(255,195,106,.08); }

    .btn-new {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #0d1b2a;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 12px;
      border: none;
      border-radius: 12px;
      padding: 9px 18px;
      cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 10px 24px rgba(216,184,92,0.18);
      transition: opacity 0.15s, transform 0.15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn-new:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 14px 30px rgba(216,184,92,0.24); }

    .board-wrap {
      position: relative;
      z-index: 1;
      padding: 28px 24px 60px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      min-height: calc(100vh - 64px);
    }

    .col {
      width: var(--col-w);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .col-header {
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.035));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 13px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 76px;
      z-index: 10;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 28px rgba(0,0,0,.16);
    }

    .col-title {
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .col-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 9px;
    }

    .col[data-col="screenshot"] .col-header { box-shadow: inset 0 2px 0 #77b7ff, 0 10px 28px rgba(0,0,0,.16); }
    .col[data-col="facebook"]   .col-header { box-shadow: inset 0 2px 0 #8ea2ff, 0 10px 28px rgba(0,0,0,.16); }
    .col[data-col="instagram"]  .col-header { box-shadow: inset 0 2px 0 #f7a1d1, 0 10px 28px rgba(0,0,0,.16); }
    .col[data-col="head"]       .col-header { box-shadow: inset 0 2px 0 #75e2c8, 0 10px 28px rgba(0,0,0,.16); }
    .col[data-col="whatsapp"]   .col-header { box-shadow: inset 0 2px 0 #59e38c, 0 10px 28px rgba(0,0,0,.16); }
    .col[data-col="curadoria"]  .col-header { box-shadow: inset 0 2px 0 #ffe08a, 0 10px 28px rgba(0,0,0,.16); }
    .col[data-col="cemiterio"]  .col-header { box-shadow: inset 0 2px 0 #8793a3, 0 10px 28px rgba(0,0,0,.16); }

    .col-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 142px;
      padding: 5px 2px 18px;
      border-radius: 18px;
      transition: background 0.15s, outline-color 0.15s;
    }

    .col-body.drag-over {
      background: rgba(255,255,255,0.045);
      outline: 2px dashed rgba(255,224,138,0.32);
      outline-offset: 4px;
    }

    .idea-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.035));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      cursor: grab;
      position: relative;
      transition: border-color 0.18s, transform 0.15s, box-shadow 0.2s, background .18s;
      user-select: none;
      box-shadow: 0 10px 26px rgba(0,0,0,0.16);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }
    .idea-card::before {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: linear-gradient(180deg, var(--blue), var(--pink), var(--green));
      opacity: .7;
    }
    .idea-card:hover {
      border-color: rgba(255,224,138,0.24);
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(0,0,0,0.24);
      background: linear-gradient(180deg, rgba(255,255,255,0.095), rgba(255,255,255,0.05));
    }
    .idea-card.dragging { opacity: 0.52; cursor: grabbing; transform: rotate(1deg) scale(.99); }
    .col[data-col="cemiterio"] .idea-card { opacity: 0.58; filter: grayscale(0.35); }

    .card-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 12px;
      display: block;
      border: 1px solid var(--line);
    }

    .card-title {
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 7px;
      line-height: 1.35;
      padding-left: 2px;
      overflow-wrap: anywhere;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.62;
      margin-bottom: 10px;
      max-height: 260px;
      overflow: hidden;
      overflow-wrap: anywhere;
    }
    .card-desc p { margin: 0 0 7px; }
    .card-desc ul, .card-desc ol { margin: 8px 0 8px 22px; padding-left: 14px; }
    .card-desc li { margin: 3px 0; padding-left: 3px; }
    .card-desc img { max-width: 100%; height: auto; border-radius: 10px; display: block; margin: 8px 0; border: 1px solid var(--line); }

    .card-link {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: #88c4ff;
      word-break: break-all;
      margin-bottom: 10px;
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }

    .card-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--gold-light);
      background: rgba(216,184,92,0.1);
      border: 1px solid rgba(216,184,92,0.2);
      border-radius: 999px;
      padding: 3px 8px;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .thermometer { display: flex; align-items: center; gap: 4px; margin-bottom: 12px; }
    .thermo-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted2); letter-spacing: 0.06em; margin-right: 4px; }
    .thermo-pip { width: 18px; height: 8px; border-radius: 999px; background: rgba(255,255,255,0.08); transition: background 0.2s; }
    .thermo-pip.active-1 { background: #77b7ff; }
    .thermo-pip.active-2 { background: #75e2c8; }
    .thermo-pip.active-3 { background: #ffe08a; }
    .thermo-pip.active-4 { background: #ffc36a; }
    .thermo-pip.active-5 { background: #ff7d7d; }
    .thermo-icon { font-size: 12px; margin-left: 4px; }

    .card-actions { display: flex; gap: 6px; margin-top: 4px; position: relative; z-index: 2; }
    .card-btn {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 6px 0;
      border-radius: 9px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.045);
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color .15s;
      letter-spacing: 0.04em;
    }
    .card-btn:hover { background: rgba(216,184,92,0.12); color: var(--gold-light); border-color: rgba(216,184,92,0.22); }
    .card-btn.danger:hover { background: rgba(255,125,125,0.11); color: #ffb5b5; border-color: rgba(255,125,125,0.28); }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(2,8,16,0.74);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(8px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: linear-gradient(180deg, rgba(22,36,56,0.98), rgba(14,27,44,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 30px;
      width: 100%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 26px 70px rgba(0,0,0,0.46);
    }
    .modal h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .modal h2 span { color: var(--gold-light); }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .field input, .field textarea, .field select, .rich-desc {
      width: 100%;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.085);
      border-radius: 12px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background .2s;
      resize: vertical;
    }
    .field input:focus, .field textarea:focus, .field select:focus, .rich-desc:focus {
      border-color: rgba(255,224,138,.58);
      box-shadow: 0 0 0 4px rgba(216,184,92,0.12);
      background: rgba(255,255,255,0.075);
    }
    .field select option { background: #132337; color: var(--text); }

    .thermo-modal { display: flex; gap: 8px; align-items: center; }
    .thermo-modal-btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      cursor: pointer;
      font-size: 16px;
      transition: transform 0.1s, background 0.15s, border-color .15s;
      text-align: center;
    }
    .thermo-modal-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.075); }
    .thermo-modal-btn.selected { border-color: rgba(255,224,138,.6); background: rgba(216,184,92,0.12); box-shadow: 0 0 0 3px rgba(216,184,92,0.08); }

    .tags-input-wrap { display: flex; gap: 8px; }
    .tags-input-wrap input { flex: 1; }
    .btn-add-tag {
      background: rgba(216,184,92,0.10);
      border: 1px solid rgba(216,184,92,0.18);
      border-radius: 12px;
      padding: 0 14px;
      color: var(--gold-light);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color .15s;
    }
    .btn-add-tag:hover { background: rgba(216,184,92,0.18); border-color: rgba(255,224,138,.36); }
    .tags-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag-preview {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--gold-light);
      background: rgba(216,184,92,0.1);
      border: 1px solid rgba(216,184,92,0.2);
      border-radius: 999px;
      padding: 4px 9px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .tag-preview:hover { background: rgba(255,125,125,0.15); color: #ffb5b5; }

    .img-upload-area { display: none; }
    .img-preview { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }

    .rich-desc {
      min-height: 132px;
      max-height: 340px;
      overflow: auto;
      line-height: 1.68;
      word-break: break-word;
    }
    .rich-desc:empty::before { content: attr(data-placeholder); color: var(--muted2); pointer-events: none; }
    .rich-desc ul, .rich-desc ol { margin: 8px 0 8px 22px; padding-left: 18px; }
    .rich-desc li { margin: 4px 0; padding-left: 4px; }
    .rich-desc img { max-width: 100%; height: auto; border-radius: 10px; margin: 8px 0; border: 1px solid rgba(255,255,255,0.10); display: block; cursor: pointer; }
    .rich-desc img.img-selected { outline: 2px solid var(--gold-light); box-shadow: 0 0 0 4px rgba(216,184,92,0.13); }
    .editor-hint { margin-top: 6px; font-size: 11px; color: var(--muted2); line-height: 1.5; }
    .img-resize-wrap { display: inline-block; position: relative; max-width: 100%; }
    .img-resize-wrap .resize-handle {
      position: absolute; bottom: 4px; right: 4px; width: 15px; height: 15px;
      border-radius: 5px; background: var(--gold-light); cursor: se-resize; z-index: 2;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .floating-editor {
      position: fixed;
      left: 0; top: 0;
      display: none;
      align-items: center;
      gap: 5px;
      padding: 8px 9px;
      background: var(--toolbar);
      border: 1px solid rgba(255,224,138,0.24);
      border-radius: 16px;
      box-shadow: 0 16px 44px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      z-index: 9999;
      transform: translate(-50%, -100%);
      max-width: calc(100vw - 24px);
      overflow-x: auto;
    }
    .floating-editor.open { display: flex; }
    .floating-editor::after {
      content: ''; position: absolute; left: 50%; bottom: -6px; width: 10px; height: 10px;
      transform: translateX(-50%) rotate(45deg); background: var(--toolbar);
      border-right: 1px solid rgba(255,224,138,0.24); border-bottom: 1px solid rgba(255,224,138,0.24);
    }
    .floating-editor button, .floating-editor select {
      height: 30px; padding: 4px 9px; border-radius: 10px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); font-size: 11px; font-family: 'DM Sans', sans-serif; cursor: pointer; outline: none;
      white-space: nowrap;
    }
    .floating-editor button:hover, .floating-editor select:hover { background: rgba(216,184,92,0.16); border-color: rgba(255,224,138,.38); color: var(--gold-light); }
    .floating-editor select option { background: #132337; color: var(--text); }
    .floating-editor .sep { width: 1px; height: 22px; background: rgba(255,255,255,0.08); margin: 0 2px; flex: 0 0 auto; }
    .palette-menu { position: relative; display: inline-flex; }
    .palette-pop { position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%); display: none; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 230px; padding: 10px; background: rgba(8,20,34,0.98); border: 1px solid rgba(255,224,138,0.18); border-radius: 14px; box-shadow: 0 18px 46px rgba(0,0,0,0.45); }
    .palette-menu.open .palette-pop { display: grid; }
    .color-btn { height: 34px !important; padding: 4px !important; display: flex !important; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
    .swatch { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.45); display: inline-block; }
    .hex { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); }
    .multi-img-input { display:none; }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
    .btn-save {
      flex: 1;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #0d1b2a;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 13px;
      border: none;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform .15s;
    }
    .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-save:disabled { opacity: .58; cursor: wait; transform: none; }
    .btn-cancel {
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 20px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color .15s;
    }
    .btn-cancel:hover { background: rgba(255,255,255,0.07); color: var(--text); }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: var(--muted2);
      font-size: 12px;
      border: 1px dashed rgba(255,255,255,0.08);
      border-radius: 16px;
      line-height: 1.6;
      background: rgba(255,255,255,0.025);
    }
    .empty-state .emoji { font-size: 24px; display: block; margin-bottom: 8px; }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      background: rgba(19,35,55,0.96);
      border: 1px solid rgba(255,224,138,0.18);
      border-radius: 14px;
      padding: 12px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--gold-light);
      backdrop-filter: blur(8px);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      box-shadow: 0 14px 34px rgba(0,0,0,.28);
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(216,184,92,0.20); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(216,184,92,0.34); }


    /* ── FUNDO NEURAL ── */
    html {
      min-height: 100%;
      overflow-x: auto;
      background: #081422;
      overscroll-behavior-x: none;
    }

    body {
      background-color: #081422;
      background-image:
        radial-gradient(circle at 12% 8%, rgba(119,183,255,0.18), transparent 26%),
        radial-gradient(circle at 88% 12%, rgba(247,161,209,0.14), transparent 24%),
        radial-gradient(circle at 78% 82%, rgba(117,226,200,0.13), transparent 26%),
        linear-gradient(135deg, #081422 0%, #101f32 46%, #07111e 100%);
      background-repeat: no-repeat;
      background-attachment: fixed;
      overscroll-behavior-x: none;
    }

    #neural-bg {
      position: fixed;
      inset: -16px;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 22%, rgba(119,183,255,0.10), transparent 24%),
        radial-gradient(circle at 82% 18%, rgba(247,161,209,0.08), transparent 22%),
        radial-gradient(circle at 52% 58%, rgba(117,226,200,0.07), transparent 28%),
        linear-gradient(135deg, #081422 0%, #0d1b2a 45%, #07111e 100%);
    }

    /* Rede neural — constelação animada por CSS (zero canvas, zero JS) */
    #star-net {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: visible;
    }

    #star-net .sn-line {
      stroke-linecap: round;
      fill: none;
      stroke-dasharray: 6 22;
      stroke-dashoffset: 0;
    }
    #star-net .sn-line.a { stroke: rgba(119,183,255,0.22); stroke-width: 0.9; animation: snDash 14s linear infinite; }
    #star-net .sn-line.b { stroke: rgba(247,161,209,0.18); stroke-width: 0.8; animation: snDash 18s linear infinite reverse; }
    #star-net .sn-line.c { stroke: rgba(255,224,138,0.20); stroke-width: 0.9; animation: snDash 11s linear infinite; }
    #star-net .sn-line.d { stroke: rgba(117,226,200,0.16); stroke-width: 0.7; animation: snDash 20s linear infinite reverse; }

    #star-net .sn-node {
      animation: snBlink 4s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    #star-net .sn-node.s1 { animation-duration: 3.6s; }
    #star-net .sn-node.s2 { animation-duration: 5.1s; animation-delay: -1.4s; }
    #star-net .sn-node.s3 { animation-duration: 6.4s; animation-delay: -2.8s; }

    #star-net .sn-signal {
      opacity: .9;
      filter: drop-shadow(0 0 5px currentColor);
    }

    @keyframes snDash {
      to { stroke-dashoffset: -120; }
    }
    @keyframes snBlink {
      0%, 100% { opacity: .72; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.35); }
    }

    @media (max-width: 760px) {
      :root { --col-w: 86vw; }
      .topbar { padding: 0 16px; }
      .sync-status { display: none; }
      .modal { padding: 22px; }
      .floating-editor { transform: translate(-50%, -102%); }
    }

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, push, set, update, remove, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "AIzaSyC_WmNYQ8f5ChftZfEdNLtdUWMDE-10RZ8",
  authDomain:        "sistema-de-vida-e6c68.firebaseapp.com",
  databaseURL:       "https://sistema-de-vida-e6c68-default-rtdb.firebaseio.com",
  projectId:         "sistema-de-vida-e6c68",
  storageBucket:     "sistema-de-vida-e6c68.firebasestorage.app",
  messagingSenderId: "590218702063",
  appId:             "1:590218702063:web:4586798cf9925edacb7f1a"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

const COLS = ['screenshot','facebook','instagram','head','whatsapp','curadoria','cemiterio'];
const LABELS = {
  screenshot: 'Capture prints aqui',
  facebook:   'Salvos do Facebook',
  instagram:  'Reels e posts salvos',
  head:       'Insights que vieram na cabeça',
  whatsapp:   'Links e ideias salvas no WhatsApp',
  curadoria:  'Ideias que passaram no filtro',
  cemiterio:  'Descanse em paz, ideias 🪦'
};
const THERMO_ICONS = ['','❄️','🌊','⚡','🔥','🌋'];

let currentUser = null;
let currentTags = [];
let currentThermo = 3;
let editingId = null;
let _ideasRef = null;
let _unsubscribe = null;

function escapeHtml(str) {
  return String(str || '').replace(/[&<>'"]/g, ch =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  el.className = 'sync-status ' + state;
  el.textContent = msg;
}

// ── AUTH GUARD ──
onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  _ideasRef = ref(db, 'ideas/' + user.uid);
  listenIdeas();
});

// ── ESCUTA EM TEMPO REAL (Realtime Database) ──
function listenIdeas() {
  if (_unsubscribe) { off(_ideasRef); }
  setSyncStatus('busy', 'Carregando...');

  onValue(_ideasRef, snap => {
    // limpar board
    COLS.forEach(c => document.getElementById('col-' + c).innerHTML = '');

    const items = [];
    snap.forEach(child => items.push({ id: child.key, ...child.val() }));
    // ordenar do mais recente para o mais antigo
    items.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
    items.forEach(renderCard);

    updateCounts();
    setupDragDrop();
    setSyncStatus('ok', 'Sincronizado ✓');
  }, err => {
    console.error('Realtime DB error:', err);
    setSyncStatus('warn', 'Offline');
  });

  _unsubscribe = true;
}

// ── RENDER CARD ──
function renderCard(idea) {
  const col = document.getElementById('col-' + idea.col);
  if (!col) return;

  const thermoHtml = [1,2,3,4,5].map(i => {
    const cls = i <= idea.thermo ? `thermo-pip active-${idea.thermo}` : 'thermo-pip';
    return `<div class="${cls}"></div>`;
  }).join('');

  const thermoIcon = THERMO_ICONS[idea.thermo] || '⚡';
  const tagsHtml   = (idea.tags||[]).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
  const imgHtml    = idea.img  ? `<img class="card-img" src="${idea.img}" alt=""/>` : '';
  const linkHtml   = idea.link ? `<a class="card-link" href="${idea.link}" target="_blank" rel="noopener">🔗 ${idea.link}</a>` : '';

  const div = document.createElement('div');
  div.className   = 'idea-card';
  div.draggable   = true;
  div.dataset.id  = idea.id;
  div.innerHTML = `
    ${imgHtml}
    <div class="card-title">${escapeHtml(idea.title)}</div>
    ${idea.desc ? `<div class="card-desc">${idea.desc}</div>` : ''}
    ${linkHtml}
    ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
    <div class="thermometer">
      <span class="thermo-label">Valor</span>
      ${thermoHtml}
      <span class="thermo-icon">${thermoIcon}</span>
    </div>
    <div class="card-actions">
      <button class="card-btn" data-edit="${idea.id}">✏️ Editar</button>
      <button class="card-btn danger" data-del="${idea.id}">🗑️</button>
    </div>
  `;

  // eventos de editar/deletar por delegação (evita closure duplicado)
  div.querySelector('[data-edit]').addEventListener('click', () => openModalEdit(idea));
  div.querySelector('[data-del]').addEventListener('click', () => deleteIdea(idea.id));

  // drag
  div.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', idea.id);
    div.classList.add('dragging');
  });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));

  // insere no TOPO
  const first = col.querySelector('.idea-card');
  if (first) col.insertBefore(div, first);
  else col.appendChild(div);

  const empty = col.querySelector('.empty-state');
  if (empty) empty.remove();
}

// ── DRAG & DROP ──
function setupDragDrop() {
  document.querySelectorAll('.col-body').forEach(col => {
    // Remove listeners antigos clonando o nó
    const fresh = col.cloneNode(true);
    col.parentNode.replaceChild(fresh, col);
  });

  document.querySelectorAll('.col-body').forEach(col => {
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      const id      = e.dataTransfer.getData('text/plain');
      const newCol  = col.id.replace('col-', '');
      // Atualiza no DOM imediatamente (otimista)
      const cardEl  = document.querySelector(`.idea-card[data-id="${id}"]`);
      if (cardEl) {
        const first = col.querySelector('.idea-card');
        if (first) col.insertBefore(cardEl, first);
        else col.appendChild(cardEl);
        updateCounts();
      }
      // Persiste no Realtime Database (rápido, sem await na UI)
      setSyncStatus('busy', 'Salvando...');
      update(ref(db, `ideas/${currentUser.uid}/${id}`), { col: newCol })
        .then(() => setSyncStatus('ok', 'Sincronizado ✓'))
        .catch(() => setSyncStatus('warn', 'Erro ao mover'));
    });
  });
}

// ── CONTAGENS ──
function updateCounts() {
  COLS.forEach(c => {
    const col   = document.getElementById('col-' + c);
    const count = col.querySelectorAll('.idea-card').length;
    document.getElementById('count-' + c).textContent = count;
    if (count === 0) {
      col.innerHTML = `<div class="empty-state"><span class="emoji">✨</span>${LABELS[c]}</div>`;
    }
  });
}

// ── MODAL NOVA IDEIA ──
window.openModal = function() {
  editingId     = null;
  currentTags   = [];
  currentThermo = 3;
  document.getElementById('f-title').value   = '';
  document.getElementById('f-desc').innerHTML = '';
  document.getElementById('f-source').value  = 'screenshot';
  document.getElementById('f-link').value    = '';
  document.getElementById('modal-title').innerHTML = '💡 Nova <span>Ideia</span>';
  renderTagsPreview();
  setThermo(3);
  document.getElementById('modal').classList.add('open');
};

function openModalEdit(idea) {
  editingId     = idea.id;
  currentTags   = [...(idea.tags || [])];
  currentThermo = idea.thermo || 3;
  document.getElementById('f-title').value    = idea.title || '';
  document.getElementById('f-desc').innerHTML  = idea.desc  || '';
  document.getElementById('f-source').value   = idea.col   || 'screenshot';
  document.getElementById('f-link').value     = idea.link  || '';
  document.getElementById('modal-title').innerHTML = '✏️ Editar <span>Ideia</span>';
  renderTagsPreview();
  setThermo(currentThermo);
  document.getElementById('modal').classList.add('open');
}

window.closeModal = function() {
  document.getElementById('modal').classList.remove('open');
  editingId = null; currentTags = []; currentThermo = 3;
};

// fechar clicando fora
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ── TAGS ──
window.addTag = function() {
  const input = document.getElementById('f-tag-input');
  const val   = input.value.trim();
  if (val && !currentTags.includes(val)) { currentTags.push(val); renderTagsPreview(); }
  input.value = '';
};

function renderTagsPreview() {
  document.getElementById('tags-preview').innerHTML =
    currentTags.map(t => `<span class="tag-preview" onclick="removeTag('${escapeHtml(t)}')">${escapeHtml(t)} ×</span>`).join('');
}

window.removeTag = function(t) {
  currentTags = currentTags.filter(x => x !== t);
  renderTagsPreview();
};

// ── TERMÔMETRO ──
window.setThermo = function(val) {
  currentThermo = val;
  document.querySelectorAll('.thermo-modal-btn').forEach(b =>
    b.classList.toggle('selected', parseInt(b.dataset.val) === val));
};

// ── SALVAR (Realtime Database — instantâneo) ──
window.saveIdea = async function() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showToast('Título obrigatório'); return; }

  const data = {
    uid:       currentUser.uid,
    title,
    desc:      document.getElementById('f-desc').innerHTML.trim(),
    col:       document.getElementById('f-source').value || 'screenshot',
    link:      document.getElementById('f-link').value.trim(),
    tags:      [...currentTags],
    thermo:    currentThermo,
    updatedAt: Date.now()
  };

  setSyncStatus('busy', 'Salvando...');
  closeModal();

  try {
    if (!editingId) {
      data.createdAt = Date.now();
      await push(_ideasRef, data);
    } else {
      await update(ref(db, `ideas/${currentUser.uid}/${editingId}`), data);
    }
    setSyncStatus('ok', 'Sincronizado ✓');
    showToast(editingId ? 'Ideia atualizada ✓' : 'Ideia salva ✓');
  } catch (err) {
    console.error('Erro ao salvar:', err);
    setSyncStatus('warn', 'Erro ao salvar');
    showToast('Erro ao salvar. Tente novamente.');
  }
};

// ── DELETAR ──
async function deleteIdea(id) {
  if (!confirm('Remover esta ideia permanentemente?')) return;
  setSyncStatus('busy', 'Removendo...');
  try {
    await remove(ref(db, `ideas/${currentUser.uid}/${id}`));
    setSyncStatus('ok', 'Sincronizado ✓');
    showToast('Ideia removida');
  } catch (err) {
    console.error('Erro ao remover:', err);
    setSyncStatus('warn', 'Erro ao remover');
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
window.showToast = showToast;

// ── EDITOR AVANÇADO DA DESCRIÇÃO ──
let savedRange = null;
const descEditor     = document.getElementById('f-desc');
const floatingEditor = document.getElementById('floatingEditor');
const descImageInput = document.getElementById('descImageInput');

function getDescSelectionRange() {
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount || sel.isCollapsed) return null;
  const range = sel.getRangeAt(0);
  const root  = range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
    ? range.commonAncestorContainer : range.commonAncestorContainer.parentElement;
  return root && root.closest && root.closest('#f-desc') ? range : null;
}
function saveDescSelection()    { const r = getDescSelectionRange(); if (r) savedRange = r.cloneRange(); return !!r; }
function restoreDescSelection() {
  if (!savedRange) return;
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(savedRange);
  descEditor.focus({ preventScroll: true });
}
function positionEditorToolbar() {
  const range = getDescSelectionRange();
  if (!range) { floatingEditor.classList.remove('open'); return; }
  saveDescSelection();
  const rect = range.getBoundingClientRect();
  if (!rect || (!rect.width && !rect.height)) return;
  floatingEditor.classList.add('open');
  requestAnimationFrame(() => {
    const tb   = floatingEditor.getBoundingClientRect();
    let left   = rect.left + rect.width / 2;
    let top    = rect.top - 12;
    const pad  = 12;
    left = Math.max(pad + tb.width/2, Math.min(window.innerWidth - pad - tb.width/2, left));
    if (top - tb.height < pad) top = rect.bottom + tb.height + 18;
    floatingEditor.style.left = left + 'px';
    floatingEditor.style.top  = top  + 'px';
  });
}
function wrapSelection(styleObj) {
  restoreDescSelection();
  const sel = window.getSelection();
  if (!sel || !sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const span  = document.createElement('span');
  Object.assign(span.style, styleObj);
  try { range.surroundContents(span); }
  catch(e) { span.appendChild(range.extractContents()); range.insertNode(span); }
  range.selectNodeContents(span);
  sel.removeAllRanges(); sel.addRange(range);
  savedRange = range.cloneRange();
}
function execDesc(cmd, val=null) { restoreDescSelection(); document.execCommand(cmd, false, val); saveDescSelection(); }

floatingEditor.addEventListener('mousedown', e => e.preventDefault());
floatingEditor.querySelectorAll('[data-cmd]').forEach(btn =>
  btn.addEventListener('click', () => { execDesc(btn.dataset.cmd); positionEditorToolbar(); }));
document.getElementById('fontFamilySel').addEventListener('change', e => {
  if (e.target.value) wrapSelection({ fontFamily: e.target.value });
  e.target.value = ''; positionEditorToolbar();
});
document.getElementById('fontSizeSel').addEventListener('change', e => {
  if (e.target.value) wrapSelection({ fontSize: e.target.value });
  e.target.value = ''; positionEditorToolbar();
});

const TEXT_COLORS = ['#e8edf3','#d8b85c','#ef4444','#f97316','#f59e0b','#22c55e','#14b8a6','#3b82f6','#8b5cf6','#ec4899','#ffffff','#111827'];
const BG_COLORS   = ['#fff3bf','#fde68a','#fecaca','#fed7aa','#bbf7d0','#ccfbf1','#bfdbfe','#ddd6fe','#fbcfe8','#e5e7eb','#ffffff','#0d1b2a'];

function buildPalette(id, colors, kind) {
  const el = document.getElementById(id);
  el.innerHTML = colors.map(hex =>
    `<button type="button" class="color-btn" data-hex="${hex}"><span class="swatch" style="background:${hex}"></span><span class="hex">${hex}</span></button>`
  ).join('');
  el.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
    wrapSelection(kind === 'text' ? { color: b.dataset.hex } : { backgroundColor: b.dataset.hex });
    document.querySelectorAll('.palette-menu').forEach(m => m.classList.remove('open'));
    positionEditorToolbar();
  }));
}
buildPalette('textPalette', TEXT_COLORS, 'text');
buildPalette('bgPalette', BG_COLORS, 'bg');

document.getElementById('textPaletteBtn').addEventListener('click', () => {
  document.getElementById('textPaletteMenu').classList.toggle('open');
  document.getElementById('bgPaletteMenu').classList.remove('open');
});
document.getElementById('bgPaletteBtn').addEventListener('click', () => {
  document.getElementById('bgPaletteMenu').classList.toggle('open');
  document.getElementById('textPaletteMenu').classList.remove('open');
});

document.addEventListener('selectionchange', () => {
  clearTimeout(window.__ideaToolbarTimer);
  window.__ideaToolbarTimer = setTimeout(positionEditorToolbar, 70);
});
document.addEventListener('mousedown', e => {
  if (floatingEditor.contains(e.target)) return;
  document.querySelectorAll('.palette-menu').forEach(m => m.classList.remove('open'));
  if (!e.target.closest('#f-desc')) floatingEditor.classList.remove('open');
});

// ── IMAGENS NA DESCRIÇÃO ──
document.getElementById('insertDescImageBtn').addEventListener('click', () => { restoreDescSelection(); descImageInput.click(); });
descImageInput.addEventListener('change', e => insertImagesIntoDesc(Array.from(e.target.files || [])));

function insertImagesIntoDesc(files) {
  if (!files.length) return;
  restoreDescSelection();
  files.filter(f => f.type.startsWith('image/')).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => { const img = document.createElement('img'); img.src = ev.target.result; insertNodeAtSelection(img); };
    reader.readAsDataURL(file);
  });
  descImageInput.value = '';
}
function insertNodeAtSelection(node) {
  restoreDescSelection();
  const sel = window.getSelection();
  if (sel && sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents(); range.insertNode(node);
    range.setStartAfter(node); range.collapse(true);
    sel.removeAllRanges(); sel.addRange(range);
    savedRange = range.cloneRange();
  } else { descEditor.appendChild(node); }
}
descEditor.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  const imgs = Array.from(items).filter(i => i.type.startsWith('image/'));
  if (!imgs.length) return;
  e.preventDefault();
  imgs.forEach(item => {
    const file = item.getAsFile(); if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { const img = document.createElement('img'); img.src = ev.target.result; insertNodeAtSelection(img); };
    reader.readAsDataURL(file);
  });
});
descEditor.addEventListener('click', e => {
  if (e.target.tagName === 'IMG') selectResizableImage(e.target);
  else descEditor.querySelectorAll('.img-resize-wrap').forEach(unwrapImage);
});
function unwrapImage(wrap) {
  const img = wrap.querySelector('img'); if (!img) return;
  img.classList.remove('img-selected');
  wrap.parentNode.insertBefore(img, wrap); wrap.remove();
}
function selectResizableImage(img) {
  descEditor.querySelectorAll('.img-resize-wrap').forEach(w => { if (!w.contains(img)) unwrapImage(w); });
  img.classList.add('img-selected');
  if (img.parentNode.classList.contains('img-resize-wrap')) return;
  const wrap = document.createElement('span');
  wrap.className = 'img-resize-wrap'; wrap.contentEditable = 'false';
  img.parentNode.insertBefore(wrap, img); wrap.appendChild(img);
  const handle = document.createElement('span');
  handle.className = 'resize-handle'; wrap.appendChild(handle);
  let startX = 0, startW = 0;
  handle.addEventListener('mousedown', ev => {
    ev.preventDefault(); ev.stopPropagation();
    startX = ev.clientX; startW = img.offsetWidth;
    const onMove = mv => { img.style.width = Math.max(60, startW + mv.clientX - startX) + 'px'; img.style.maxWidth = 'none'; };
    const onUp   = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}
