<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aquisições — Sistema de Vida</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d1b2a'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-size='18'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:         #0d1b2a;
    --card:       #1b2e42;
    --card-alt:   #162436;
    --gold:       #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim:   rgba(201,168,76,0.18);
    --gold-border:rgba(201,168,76,0.28);
    --text:       #e8edf2;
    --text-muted: #7a92a8;
    --green:      #4caf82;
    --green-dim:  rgba(76,175,130,0.15);
    --amber:      #e8a03a;
    --amber-dim:  rgba(232,160,58,0.15);
    --red:        #e05c5c;
    --red-dim:    rgba(224,92,92,0.15);
    --blue:       #4a9eda;
    --blue-dim:   rgba(74,158,218,0.15);
    --radius:     16px;
    --radius-sm:  8px;
    --mono:       'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; min-height: 100%; }
  body {
    background: radial-gradient(ellipse at 20% 10%, #0f2237 0%, var(--bg) 60%);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    min-height: 100vh;
    padding: 24px 20px 60px;
    overflow-x: hidden;
  }
  body.modal-open { overflow: hidden; }
  button,input,select,textarea{font:inherit}
  button{cursor:pointer;touch-action:manipulation}
  a{color:inherit}
  .hidden{display:none!important}

  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .page-header-left h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 1.55rem;
    font-weight: 700;
    color: var(--gold-light);
    position: relative;
    padding-left: 14px;
  }
  .page-header-left h1::before {
    content: '';
    position: absolute;
    left: 0; top: 4px;
    width: 4px; height: 18px;
    background: var(--gold);
    border-radius: 2px;
  }
  .page-header-left p {
    color: var(--text-muted);
    font-size: 0.82rem;
    margin-top: 4px;
    padding-left: 14px;
    font-family: var(--mono);
  }
  .back-link{
    display:inline-flex;align-items:center;gap:6px;margin:0 0 7px 14px;
    color:var(--text-muted);text-decoration:none;font-family:var(--mono);font-size:.73rem;
  }
  .back-link:hover{color:var(--gold-light)}
  .status {
    display:inline-flex;align-items:center;gap:6px;
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--text-muted);
    margin-top: 6px;
    margin-left: 14px;
    padding: 4px 9px;
    border:1px solid rgba(122,146,168,0.22);
    border-radius:999px;
    background:rgba(122,146,168,0.07);
    white-space:nowrap;
  }
  .status::before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.8}
  .status.ok{color:var(--green);border-color:rgba(76,175,130,.32);background:var(--green-dim)}
  .status.busy{color:var(--gold-light);border-color:var(--gold-border);background:var(--gold-dim)}
  .status.warn{color:var(--amber);border-color:rgba(232,160,58,.32);background:var(--amber-dim)}

  .btn,.primary-btn,.ghost-btn,.plain-btn,.danger-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:8px 16px;
    min-height:40px;
    border-radius:var(--radius-sm);
    font-family:'DM Sans',sans-serif;
    font-size:.85rem;
    font-weight:500;
    cursor:pointer;
    transition:opacity .2s, transform .1s, border-color .2s, background .2s;
    text-decoration:none;
  }
  .btn:active,.primary-btn:active,.ghost-btn:active,.plain-btn:active,.danger-btn:active{transform:scale(.97)}
  .btn-gold,.primary-btn{
    border:none;
    background:linear-gradient(135deg,var(--gold),var(--gold-light));
    color:#0d1b2a;
    font-weight:700;
  }
  .btn-ghost,.ghost-btn,.plain-btn{
    background:var(--gold-dim);
    color:var(--gold-light);
    border:1px solid var(--gold-border);
  }
  .plain-btn{background:transparent;color:var(--text-muted)}
  .danger-btn{background:var(--red-dim);color:#ffb7b7;border:1px solid rgba(224,92,92,.32)}
  .btn:hover,.primary-btn:hover,.ghost-btn:hover,.plain-btn:hover,.danger-btn:hover{opacity:.88}
  .primary-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

  .kpi-row,.stats {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:14px;
    margin-bottom:24px;
  }
  .stat,.kpi-card {
    background:var(--card);
    border:1px solid var(--gold-border);
    border-radius:var(--radius);
    padding:18px 20px;
    position:relative;
    overflow:hidden;
  }
  .stat::after,.kpi-card::after{
    content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4;
  }
  .stat b,.kpi-value{
    display:block;
    font-family:'Poppins',sans-serif;
    font-size:1.9rem;
    font-weight:700;
    color:var(--gold-light);
    line-height:1;
    letter-spacing:-.03em;
  }
  .stat span,.kpi-label,.kpi-sub{
    display:block;
    font-size:.72rem;
    font-family:var(--mono);
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-top:6px;
  }

  .toolbar {
    background:var(--card);
    border:1px solid var(--gold-border);
    border-radius:var(--radius);
    padding:16px 20px;
    margin-bottom:20px;
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    align-items:flex-end;
  }
  .toolbar-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:180px}
  .toolbar-group label{
    font-size:.7rem;font-family:var(--mono);color:var(--text-muted);
    text-transform:uppercase;letter-spacing:.06em;
  }
  .toolbar input[type="text"],.toolbar input[type="search"],.toolbar select,.field input,.field select,.field textarea,.search{
    width:100%;
    background:var(--bg);
    border:1px solid var(--gold-border);
    border-radius:var(--radius-sm);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-size:.88rem;
    padding:9px 12px;
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .toolbar input,.field input,.field select,.search{min-height:38px}
  .toolbar input:focus,.field input:focus,.field select:focus,.field textarea:focus,.search:focus,.rich-editor:focus{
    border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.15);
  }
  select option{background:#102033;color:var(--text)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .filter-btn{
    display:inline-flex;align-items:center;gap:5px;
    padding:7px 13px;border-radius:20px;font-size:.74rem;
    font-family:var(--mono);font-weight:500;white-space:nowrap;
    background:rgba(122,146,168,.12);color:var(--text-muted);border:1px solid rgba(122,146,168,.25);
  }
  .filter-btn:hover{border-color:var(--gold);color:var(--gold-light)}
  .filter-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold-light)}

  .table-wrap {
    background:var(--card);
    border:1px solid var(--gold-border);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .table-header-row {
    display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
    padding:16px 20px 12px;border-bottom:1px solid var(--gold-border);
  }
  .table-title {font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:600;color:var(--gold-light)}
  #countLabel {font-size:.75rem;font-family:var(--mono);color:var(--text-muted)}
  .list-grid-head{
    display:grid;grid-template-columns:1.2fr 1.35fr 1fr 232px;gap:12px;
    background:var(--card-alt);color:var(--text-muted);font-family:var(--mono);
    font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;
  }
  .items{display:grid;gap:0}
  .item-card{
    display:grid;grid-template-columns:1.2fr 1.35fr 1fr 232px;gap:12px;align-items:start;
    padding:14px;border-bottom:1px solid rgba(201,168,76,.08);
    background:transparent;transition:background .15s;
    position:relative;
  }
  .item-card:hover{background:rgba(201,168,76,.05)}
  .item-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:.8}
  .item-card[data-status="comprado"]::before{background:var(--green)}
  .item-card[data-status="comprar"]::before{background:var(--blue)}
  .item-card[data-status="esperar"]::before{background:var(--amber)}
  .item-card[data-status="descartado"]::before{background:var(--red)}
  .item-main{display:flex;flex-direction:column;gap:9px;min-width:0;padding-left:5px}
  .item-title{
    font-family:'Poppins',sans-serif;font-size:.95rem;font-weight:600;line-height:1.25;color:var(--text);
    overflow-wrap:anywhere;padding-left:0;
  }
  .subtotal-selector{
    display:flex;align-items:center;gap:7px;width:max-content;max-width:100%;
    padding:5px 9px;border-radius:999px;border:1px solid rgba(122,146,168,.25);
    background:rgba(122,146,168,.10);color:var(--text-muted);font-size:.72rem;
    font-family:var(--mono);user-select:none;cursor:pointer;transition:border-color .16s,background .16s,color .16s;
  }
  .subtotal-selector:hover{border-color:var(--gold);color:var(--gold-light)}
  .subtotal-selector.selected{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold-light)}
  .subtotal-selector input{width:15px;height:15px;margin:0;accent-color:var(--gold);cursor:pointer}
  .subtotal-selector strong{font-family:'DM Sans',sans-serif;font-size:.76rem;color:var(--gold-light);white-space:nowrap}
  .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-start}
  .badge{
    display:inline-flex;align-items:center;gap:4px;max-width:100%;
    padding:3px 9px;border-radius:20px;font-size:.72rem;font-family:var(--mono);font-weight:500;white-space:nowrap;
    background:rgba(122,146,168,.12);color:var(--text-muted);border:1px solid rgba(122,146,168,.25);
  }
  .badge.hot{background:var(--gold-dim);color:var(--gold-light);border-color:var(--gold-border)}
  .badge.ok{background:var(--green-dim);color:var(--green);border-color:rgba(76,175,130,.3)}
  .snippet-cell{display:grid;gap:8px;min-width:0}
  .image-preview-strip{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .thumb-card{
    position:relative;width:68px;height:52px;padding:0;overflow:hidden;border-radius:10px;
    border:1px solid var(--gold-border);background:#0a141f;box-shadow:0 8px 18px rgba(0,0,0,.18);
    cursor:pointer;transition:transform .14s,border-color .16s,opacity .16s;
  }
  .thumb-card:hover{transform:translateY(-1px);border-color:var(--gold);opacity:.92}
  .thumb-card img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb-more{
    display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:52px;padding:0 8px;
    border-radius:10px;border:1px solid var(--gold-border);background:var(--gold-dim);color:var(--gold-light);
    font-family:var(--mono);font-size:.72rem;font-weight:500;
  }
  .snippet{color:var(--text-muted);font-size:.8rem;line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow-wrap:anywhere}
  .details-body{
    grid-column:1/-1;margin-top:0;padding:14px 16px;border:1px solid rgba(201,168,76,.14);border-radius:12px;
    background:rgba(13,27,42,.55);color:var(--text-muted);font-size:.86rem;line-height:1.65;overflow-wrap:anywhere;
  }
  .details-body img{max-width:100%;height:auto;border-radius:10px;border:1px solid var(--gold-border);display:block;margin:10px 0}
  .details-body ul,.details-body ol,.rich-editor ul,.rich-editor ol{padding-left:24px}
  .card-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;align-items:flex-start}
  .card-actions button{
    background:none;border:1px solid var(--gold-border);border-radius:6px;color:var(--text-muted);
    cursor:pointer;font-size:.78rem;padding:5px 8px;transition:all .15s;font-family:'DM Sans',sans-serif;
  }
  .card-actions button:hover{border-color:var(--gold);color:var(--gold-light)}
  .card-actions button[data-action="delete"]:hover{border-color:var(--red);color:var(--red)}
  .empty{padding:52px 20px;text-align:center;color:var(--text-muted);line-height:1.6;border-bottom:1px solid rgba(201,168,76,.08)}

  .modal-overlay{
    position:fixed;inset:0;background:rgba(8,18,28,.82);backdrop-filter:blur(4px);z-index:1000;
    display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .22s;
  }
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{
    background:var(--card);border:1px solid var(--gold-border);border-radius:var(--radius);
    width:100%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.5);
    transform:translateY(10px);transition:transform .22s;
  }
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--gold-border);gap:14px}
  .modal-head h2{font-family:'Poppins',sans-serif;font-size:1.05rem;font-weight:600;color:var(--gold-light)}
  .modal-head p{margin-top:4px;color:var(--text-muted);font-size:.8rem;font-family:var(--mono)}
  .modal-close{background:none;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;line-height:1;padding:2px 6px;border-radius:4px;transition:color .15s}
  .modal-close:hover{color:var(--red)}
  .modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
  .modal-footer{padding:14px 24px 20px;border-top:1px solid var(--gold-border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

  .form-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
  .field{display:flex;flex-direction:column;gap:6px;grid-column:span 2;min-width:0}
  .field.wide{grid-column:span 3}.field.full{grid-column:1/-1}
  #dynamicFields{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;width:100%;}
  .field label{font-size:.72rem;font-family:var(--mono);color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em}
  .tags-row{display:flex;gap:10px;align-items:center}
  .tags-row input{flex:1}
  .chip-list{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:.75rem;font-family:var(--mono);font-weight:500;background:var(--gold-dim);color:var(--gold-light);border:1px solid var(--gold-border)}
  .chip:hover{background:var(--red-dim);color:#ffb7b7;border-color:rgba(224,92,92,.32)}

  .editor-box{border:1px solid var(--gold-border);border-radius:var(--radius-sm);overflow:hidden;background:var(--bg)}
  .editor-toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:6px;padding:8px;border-bottom:1px solid var(--gold-border);background:var(--card-alt)}
  .editor-toolbar button,.editor-toolbar select{
    min-height:31px;border:1px solid var(--gold-border);border-radius:7px;background:rgba(201,168,76,.08);color:var(--text);padding:5px 9px;cursor:pointer;font-size:.76rem;
  }
  .editor-toolbar button:hover,.editor-toolbar select:hover{border-color:var(--gold);color:var(--gold-light)}
  .color-dot{display:inline-block;width:14px;height:14px;border-radius:99px;border:1px solid rgba(255,255,255,.48);vertical-align:-2px}
  .rich-editor{min-height:190px;max-height:430px;overflow:auto;padding:15px;outline:none;line-height:1.65;color:var(--text);background:#0a141f;overflow-wrap:anywhere;border:0}
  .rich-editor:empty::before{content:attr(data-placeholder);color:var(--text-muted);opacity:.72}
  .rich-editor img{max-width:100%;height:auto;border-radius:10px;border:1px solid var(--gold-border);display:block;margin:10px 0;cursor:pointer}
  .resize-wrap{display:inline-block;position:relative;max-width:100%}
  .resize-wrap img{max-width:none}.resize-handle{position:absolute;right:6px;bottom:6px;width:18px;height:18px;border-radius:6px;background:var(--gold-light);box-shadow:0 4px 12px rgba(0,0,0,.3);cursor:se-resize}
  .img-selected{outline:2px solid var(--gold-light);box-shadow:0 0 0 5px rgba(201,168,76,.16)}

  .toast{position:fixed;right:18px;bottom:18px;z-index:2000;background:rgba(11,24,40,.96);border:1px solid var(--gold-border);border-radius:14px;color:var(--gold-light);box-shadow:0 18px 46px rgba(0,0,0,.34);padding:12px 16px;font-size:.83rem;font-weight:700;transform:translateY(80px);opacity:0;transition:.25s;pointer-events:none}
  .toast.show{transform:translateY(0);opacity:1}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gold-border);border-radius:3px}

  @media(max-width:980px){
    .list-grid-head{display:none}
    .item-card{grid-template-columns:1fr;gap:8px;border-left:0}
    .card-actions{justify-content:flex-start}
    .toolbar{align-items:stretch}.toolbar-group{min-width:100%}
  }
  @media(max-width:700px){
    body{padding:18px 12px 52px}.field,.field.wide{grid-column:1/-1}.form-grid,#dynamicFields{grid-template-columns:1fr}.tags-row{flex-direction:column;align-items:stretch}.modal-footer{flex-direction:column}.modal-footer button{width:100%}
  }
  @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation:none!important;transition:none!important}}

</style>
</head>
<body>
<div class="page-header">
  <div class="page-header-left">
    <a class="back-link" href="index-financas.html">← Hub</a>
    <h1>Aquisições</h1>
    <p>Fila de decisão · compras em análise</p>
    <span id="syncStatus" class="status busy">Iniciando...</span>
  </div>
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button class="btn btn-ghost" type="button" id="clearFiltersBtn">✕ Limpar filtros</button>
    <button class="btn btn-gold" type="button" id="newItemBtn">+ Nova Aquisição</button>
  </div>
</div>

<section id="stats" class="kpi-row" aria-label="Resumo"></section>

<div class="toolbar">
  <div class="toolbar-group">
    <label for="searchInput">Buscar</label>
    <input id="searchInput" class="search" type="search" placeholder="Buscar por item, tag, texto ou link...">
  </div>
  <div class="toolbar-group" style="flex:2;min-width:260px;">
    <label>Filtros rápidos</label>
    <div id="filters" class="filters"></div>
  </div>
</div>

<div class="table-wrap">
  <div class="table-header-row">
    <span class="table-title">Aquisições registradas</span>
    <span id="countLabel">0 registros</span>
  </div>
  <div class="list-grid-head" aria-hidden="true">
    <span>Item</span><span>Dados da decisão</span><span>Observação</span><span>Ações</span>
  </div>
  <section id="items" class="items" aria-live="polite"></section>
</div>

<div id="captureOverlay" class="modal-overlay" aria-hidden="true">
  <section id="capturePanel" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <div>
        <h2 id="modalTitle">Nova aquisição</h2>
        <p>Tire da cabeça, registre preço, prioridade e data para reavaliar.</p>
      </div>
      <button class="modal-close" type="button" id="modalCloseBtn" aria-label="Fechar">×</button>
    </div>

    <form id="captureForm" autocomplete="off">
      <div class="modal-body">
        <div class="form-grid">
          <div class="field wide">
            <label for="itemTitle">Item / vontade de compra</label>
            <input id="itemTitle" type="text" placeholder="Ex: monitor, curso, cadeira, luminária...">
          </div>

          <div id="dynamicFields" class="form-grid field full"></div>

          <div class="field full">
            <label>Tags / palavras-chave</label>
            <div class="tags-row">
              <input id="tagInput" type="text" placeholder="Ex: trabalho, casa, prioridade, pesquisar">
              <button id="addTagBtn" class="ghost-btn" type="button">Adicionar tag</button>
            </div>
            <div id="tagChips" class="chip-list"></div>
          </div>

          <div class="field full">
            <label>Observações, prints, comparação e motivo</label>
            <div class="editor-box">
              <div id="editorToolbar" class="editor-toolbar" aria-label="Editor de texto">
                <button type="button" data-cmd="bold"><b>N</b></button>

const FIREBASE_CONFIG = {

const state = {

let savedRange = null;

function escapeHtml(value){
  return String(value ?? "").replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[ch]));
}
function stripHtml(html){
  const div = document.createElement("div");
  div.innerHTML = html || "";
  return (div.textContent || div.innerText || "").replace(/\s+/g," ").trim();
}
function todayKey(ts=Date.now()){
  const d = new Date(ts || Date.now());
  if(Number.isNaN(d.getTime())) return "";
  return d.toISOString().slice(0,10);
}
function makeId(){
  return (crypto.randomUUID ? crypto.randomUUID() : "id_" + Date.now() + "_" + Math.random().toString(16).slice(2));
}
function safeParse(json, fallback){
  try { return JSON.parse(json); } catch { return fallback; }
}
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => toastEl.classList.remove("show"), 2600);
}
function setStatus(kind, msg){
  const el = $("#syncStatus");
  el.className = "status " + kind;
  el.textContent = msg;
}

function deletedKey(){ return CONFIG.localKey + "_deleted_ids"; }
function getDeletedIds(){
  return new Set(safeParse(localStorage.getItem(deletedKey()) || "[]", []));
}
function saveDeletedIds(ids){
  localStorage.setItem(deletedKey(), JSON.stringify([...ids]));
}
function selectedSubtotalKey(){
  return CONFIG.localKey + "_subtotal_selected";
}
function saveSubtotalSelection(){
  localStorage.setItem(selectedSubtotalKey(), JSON.stringify([...state.selectedSubtotal]));
}
function loadLocal(){
  const data = safeParse(localStorage.getItem(CONFIG.localKey) || "[]", []);
  return Array.isArray(data) ? data.filter(x => x && x.id) : [];
}
function saveLocal(items = state.items){
  localStorage.setItem(CONFIG.localKey, JSON.stringify(items));
}
function normalizeItem(item){
  const now = Date.now();
  const clean = {...item};
  clean.id = clean.id || makeId();
  clean.title = String(clean.title || "").trim();
  clean.desc = sanitizeHtml(clean.desc || "");
  clean.tags = Array.isArray(clean.tags) ? clean.tags.filter(Boolean) : [];
  clean.createdAt = Number(clean.createdAt || now);
  clean.updatedAt = Number(clean.updatedAt || clean.createdAt || now);
  return clean;
}
function mergeItems(...lists){
  const deleted = getDeletedIds();
  const map = new Map();
  lists.flat().filter(Boolean).forEach(raw => {
    const item = normalizeItem(raw);
    if(!item.id || deleted.has(item.id)) return;
    const old = map.get(item.id);
    if(!old || Number(item.updatedAt || 0) >= Number(old.updatedAt || 0)) map.set(item.id, item);
  });
  return [...map.values()].sort((a,b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));
}
function upsertItemLocal(item){
  const normalized = normalizeItem(item);
  const map = new Map(state.items.map(x => [x.id, x]));
  map.set(normalized.id, normalized);
  state.items = mergeItems([...map.values()]);
  saveLocal();
  render();
  return normalized;
}
function removeItemLocal(id){
  const deleted = getDeletedIds();
  deleted.add(id);
  saveDeletedIds(deleted);
  state.expanded.delete(id);
  state.selectedSubtotal.delete(id);
  saveSubtotalSelection();
  state.items = state.items.filter(item => item.id !== id);
  saveLocal();
  render();
}

function sanitizeHtml(html){
  const tpl = document.createElement("template");
  tpl.innerHTML = html || "";
  tpl.content.querySelectorAll("script,style,iframe,object,embed,link,meta").forEach(el => el.remove());
  tpl.content.querySelectorAll("*").forEach(el => {
    [...el.attributes].forEach(attr => {
      const name = attr.name.toLowerCase();
      const value = String(attr.value || "");
      if(name.startsWith("on") || /javascript:/i.test(value)) el.removeAttribute(attr.name);
    });
    if(el.tagName === "IMG"){
      el.setAttribute("loading","lazy");
      el.setAttribute("decoding","async");
      if(!el.getAttribute("alt")) el.setAttribute("alt","");
    }
    if(el.tagName === "A"){
      el.setAttribute("target","_blank");
      el.setAttribute("rel","noopener");
    }
  });
  return tpl.innerHTML.trim();
}
function getCleanEditorHtml(){
  const clone = editor.cloneNode(true);
  clone.querySelectorAll(".resize-handle").forEach(h => h.remove());
  clone.querySelectorAll(".resize-wrap").forEach(w => {
    const img = w.querySelector("img");
    if(img){
      img.classList.remove("img-selected");
      w.replaceWith(img);
    } else {
      w.remove();
    }
  });
  clone.querySelectorAll(".img-selected").forEach(el => el.classList.remove("img-selected"));
  return sanitizeHtml(clone.innerHTML);
}

function formMarkup(){
  $("#dynamicFields").innerHTML = CONFIG.fields.map(f => {
    const cls = f.type === "url" ? "field wide" : "field";
    if(f.type === "select"){
      return `<div class="${cls}">
        <label for="${escapeHtml(f.key)}">${escapeHtml(f.label)}</label>
        <select id="${escapeHtml(f.key)}" data-field="${escapeHtml(f.key)}">
          ${f.options.map(o => `<option value="${escapeHtml(o[0])}">${escapeHtml(o[1])}</option>`).join("")}
        </select>
      </div>`;
    }
    return `<div class="${cls}">
      <label for="${escapeHtml(f.key)}">${escapeHtml(f.label)}</label>
      <input id="${escapeHtml(f.key)}" data-field="${escapeHtml(f.key)}" type="${escapeHtml(f.type)}" placeholder="${escapeHtml(f.placeholder || "")}">
    </div>`;
  }).join("");
}
function buildFilters(){
  $("#filters").innerHTML = CONFIG.filters.map(([key,label]) =>
    `<button class="filter-btn ${key === "all" ? "active" : ""}" type="button" data-filter="${escapeHtml(key)}">${escapeHtml(label)}</button>`
  ).join("");
}
function renderTags(){
  $("#tagChips").innerHTML = state.tags.map(tag =>
    `<button class="chip" type="button" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)} ×</button>`
  ).join("");
}
function addTag(){
  const input = $("#tagInput");
  const value = input.value.trim();
  if(value && !state.tags.some(t => t.toLowerCase() === value.toLowerCase())){
    state.tags.push(value);
    renderTags();
  }
  input.value = "";
  input.focus();
}
function resetForm(){
  state.editingId = null;
  state.tags = [];
  $("#itemTitle").value = "";
  editor.innerHTML = "";
  $$("#captureForm [data-field]").forEach(el => {
    if(el.tagName === "SELECT") el.value = el.options[0]?.value || "";
    else el.value = "";
  });
  renderTags();
  $("#saveBtn").textContent = "Salvar registro";
  $("#saveBtn").disabled = false;
  $("#cancelBtn").classList.add("hidden");
}
function collectData(){
  const title = $("#itemTitle").value.trim();
  if(!title){
    showToast("Dê um nome para o item antes de salvar.");
    $("#itemTitle").focus();
    return null;
  }

  const now = Date.now();
  const old = state.editingId ? state.items.find(x => x.id === state.editingId) : null;
  const item = {
    ...(old || {}),
    id: state.editingId || (old?.id) || makeId(),
    title,
    desc: getCleanEditorHtml(),
    tags: [...state.tags],
    createdAt: old?.createdAt || now,
    updatedAt: now
  };

  CONFIG.fields.forEach(f => {
    const el = $("#" + f.key);
    item[f.key] = el ? String(el.value || "").trim() : "";
  });

  return item;
}

async function saveRemote(item){
  const saved = upsertItemLocal({...item, schemaVersion: 6});

  if(!state.currentUser || !state.remoteRef){
    setStatus("warn","Salvo só local");
    showToast("Faça login pelo Hub para sincronizar este registro na nuvem.");
    return saved;
  }

  setStatus("busy","Salvando na nuvem...");
  try{
    await update(ref(state.firebase.db, `${state.remotePath}/${saved.id}`), saved);
    setStatus("ok","Sincronizado ✓");
  }catch(err){
    console.error(err);
    setStatus("warn", err?.code === "PERMISSION_DENIED" ? "Sem permissão" : "Salvo localmente");
    showToast(err?.code === "PERMISSION_DENIED" ? "Firebase bloqueou. Confira a regra users/{uid}." : "O item ficou salvo no navegador. Firebase não confirmou agora.");
  }
  return saved;
}
async function deleteRemote(id){
  removeItemLocal(id);

  if(!state.currentUser || !state.remoteRef){
    setStatus("warn","Excluído só local");
    return;
  }

  setStatus("busy","Excluindo na nuvem...");
  try{
    await remove(ref(state.firebase.db, `${state.remotePath}/${id}`));
    setStatus("ok","Sincronizado ✓");
  }catch(err){
    console.error(err);
    setStatus("warn", err?.code === "PERMISSION_DENIED" ? "Sem permissão" : "Excluído localmente");
    showToast("Excluí da tela e do backup local. Firebase não confirmou agora.");
  }
}
async function onSave(e){
  e.preventDefault();
  if(state.isSaving) return;

  const data = collectData();
  if(!data) return;

  state.isSaving = true;
  $("#saveBtn").disabled = true;

  try{
    await saveRemote(data);
    showToast(state.editingId ? "Registro atualizado e sincronizado ✓" : "Registro salvo e sincronizado ✓");
    resetForm();
    closeCaptureModal();
  }catch(err){
    console.error(err);
    setStatus("warn","Erro ao salvar");
    showToast("Não consegui salvar. O formulário não foi limpo.");
  }finally{
    state.isSaving = false;
    $("#saveBtn").disabled = false;
  }
}

function editItem(id){
  const item = state.items.find(x => x.id === id);
  if(!item) return;

  state.editingId = id;
  $("#itemTitle").value = item.title || "";
  editor.innerHTML = sanitizeHtml(item.desc || "");
  state.tags = [...(item.tags || [])];

  CONFIG.fields.forEach(f => {
    const el = $("#" + f.key);
    if(el) el.value = item[f.key] || "";
  });

  renderTags();
  $("#saveBtn").textContent = "Atualizar registro";
  $("#cancelBtn").classList.remove("hidden");
  openCaptureModal();
  setTimeout(() => $("#itemTitle").focus(), 120);
}

function parseMoney(value){
  const raw = String(value || "").trim();
  if(!raw) return 0;

  const matches = raw.match(/-?\d{1,3}(?:\.\d{3})+(?:,\d{1,2})?|-?\d{1,3}(?:\.\d{3})*,\d{1,2}|-?\d+(?:[,.]\d{1,2})?|-?\d+/g);
  if(!matches?.length) return 0;

  let token = matches[matches.length - 1];
  if(token.includes(",")){
    token = token.replace(/\./g, "").replace(",", ".");
  }else if(/\.\d{3}(?:\D|$)/.test(token)){
    token = token.replace(/\./g, "");
  }

  const number = Number(token);
  return Number.isFinite(number) ? number : 0;
}
function brMoney(value){
  return value.toLocaleString("pt-BR", {style:"currency", currency:"BRL"});
}
function effectiveItemValue(item){
  const installmentValue = parseMoney(item.installmentValue);
  if(installmentValue > 0) return installmentValue;
  return parseMoney(item.price);
}
function statusLabel(status){
  const found = CONFIG.fields.find(f => f.key === "status")?.options?.find(o => o[0] === status);
  return found ? found[1] : status;
}
function formatDate(iso){
  if(!iso) return "";
  const [y,m,d] = String(iso).split("-");
  return y && m && d ? `${d}/${m}/${y}` : iso;
}
function itemMatches(item){
  const status = String(item.status || "").toLowerCase();
  if(state.filter !== "all" && status !== state.filter) return false;

  const q = state.search.trim().toLowerCase();
  if(!q) return true;

  const haystack = [
    item.title,
    stripHtml(item.desc),
    item.price,
    item.installments,
    item.installmentValue,
    item.priority,
    item.status,
    item.reviewAt,
    item.link,
    ...(item.tags || [])
  ].join(" ").toLowerCase();

  return haystack.includes(q);
}
function renderStats(list = state.items){
  const pending = list.filter(x => ["pendente","pesquisar","esperar"].includes(x.status)).length;
  const focus = list.filter(x => Number(x.priority || 0) >= 4).length;
  const totalValue = list.reduce((sum,item) => sum + parseMoney(item.price), 0);
  const selectedItems = list.filter(item => state.selectedSubtotal.has(item.id));
  const selectedSubtotal = selectedItems.reduce((sum,item) => sum + effectiveItemValue(item), 0);

  $("#stats").innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Registrados</div><div class="kpi-value">${list.length}</div><div class="kpi-sub">itens na fila</div></div>
    <div class="kpi-card amber"><div class="kpi-label">Em análise</div><div class="kpi-value">${pending}</div><div class="kpi-sub">pendentes / pesquisar / esperar</div></div>
    <div class="kpi-card green"><div class="kpi-label">Prioridade alta</div><div class="kpi-value">${focus}</div><div class="kpi-sub">nível 4 ou 5</div></div>
    <div class="kpi-card"><div class="kpi-label">Preço cheio total</div><div class="kpi-value" style="font-size:1.25rem">${brMoney(totalValue)}</div><div class="kpi-sub">soma do preço cheio</div></div>
    <div class="kpi-card"><div class="kpi-label">Subtotal selecionado</div><div class="kpi-value" style="font-size:1.25rem">${brMoney(selectedSubtotal)}</div><div class="kpi-sub">${selectedItems.length} item(ns) · parcela se informada</div></div>
  `;
}
function metaFor(item){
  const metas = [];
  if(item.price) metas.push(["Preço cheio", item.price, ""]);

  const installmentCount = Number(String(item.installments || "").replace(/\D/g, "")) || 0;
  const installmentValue = parseMoney(item.installmentValue);
  if(item.installments || item.installmentValue){
    let label = String(item.installmentValue || item.installments || "").trim();
    if(installmentCount && installmentValue) label = `${installmentCount}x de ${brMoney(installmentValue)}`;
    else if(installmentCount) label = `${installmentCount}x`;
    else if(installmentValue) label = `Parcela ${brMoney(installmentValue)}`;
    metas.push(["Parcelamento", label, "hot"]);
  }

  if(item.priority) metas.push(["Prioridade", item.priority, Number(item.priority) >= 4 ? "hot" : ""]);
  if(item.status) metas.push(["Momento", statusLabel(item.status), item.status === "comprado" ? "ok" : ""]);
  if(item.reviewAt) metas.push(["Reavaliar", formatDate(item.reviewAt), ""]);
  return metas;
}
function imagePreviews(html, limit = 3){
  const tpl = document.createElement("template");
  tpl.innerHTML = sanitizeHtml(html || "");
  return [...tpl.content.querySelectorAll("img")]
    .map(img => ({
      src: img.getAttribute("src") || "",
      alt: img.getAttribute("alt") || "Print da aquisição"
    }))
    .filter(img => /^(data:image\/|https?:\/\/|blob:)/i.test(img.src))
    .slice(0, limit);
}
function countImages(html){
  const tpl = document.createElement("template");
  tpl.innerHTML = sanitizeHtml(html || "");
  return tpl.content.querySelectorAll("img").length;
}
function render(){
  const sorted = [...state.items].sort((a,b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0));
  renderStats(sorted);

  const list = sorted.filter(itemMatches);
  const count = $("#countLabel");
  if(count) count.textContent = `${list.length} de ${sorted.length} registros`;
  const box = $("#items");

  if(!list.length){
    box.innerHTML = `<div class="empty">${escapeHtml(CONFIG.empty)}</div>`;
    return;
  }

  box.innerHTML = list.map(item => {
    const expanded = state.expanded.has(item.id);
    const text = stripHtml(item.desc);
    const previews = imagePreviews(item.desc, 3);
    const totalImages = countImages(item.desc);
    const hasImage = previews.length > 0;
    const imageStrip = hasImage
      ? `<div class="image-preview-strip" aria-label="Imagens coladas neste registro">
          ${previews.map((img, idx) => `<button type="button" class="thumb-card" data-action="toggle" title="Abrir observações com imagem ${idx + 1}"><img src="${escapeHtml(img.src)}" alt="${escapeHtml(img.alt)}"></button>`).join("")}
          ${totalImages > previews.length ? `<span class="thumb-more">+${totalImages - previews.length}</span>` : ""}
        </div>`
      : "";
    const metas = metaFor(item).map(([k,v,cls]) =>
      `<span class="badge ${cls || ""}">${escapeHtml(k)}: ${escapeHtml(v)}</span>`
    ).join("");
    const tags = (item.tags || []).map(tag =>
      `<span class="badge">#${escapeHtml(tag)}</span>`
    ).join("");
    const link = item.link && /^(https?:|mailto:|tel:)/i.test(item.link)
      ? `<a class="badge" href="${escapeHtml(item.link)}" target="_blank" rel="noopener">Link</a>`
      : "";
    const details = expanded
      ? `<div class="details-body">${sanitizeHtml(item.desc || "<em>Sem observações.</em>")}</div>`
      : "";
    const selected = state.selectedSubtotal.has(item.id);
    const subtotalValue = effectiveItemValue(item);
    const subtotalHint = item.installmentValue ? "Usando valor da parcela no subtotal" : "Usando preço cheio no subtotal";

    return `<article class="item-card" data-id="${escapeHtml(item.id)}" data-status="${escapeHtml(item.status || "")}">
      <div class="item-main">
        <h3 class="item-title">${escapeHtml(item.title)}</h3>
        <label class="subtotal-selector ${selected ? "selected" : ""}" title="${escapeHtml(subtotalHint)}">
          <input type="checkbox" data-subtotal-select ${selected ? "checked" : ""}>
          <span>Selecionar</span>
          <strong>${brMoney(subtotalValue)}</strong>
        </label>
      </div>
      <div class="meta">${metas}${tags}${hasImage ? '<span class="badge hot">Imagem visível</span>' : ""}${link}</div>
      <div class="snippet-cell">${imageStrip}<div class="snippet">${escapeHtml(text || "Sem observações ainda.")}</div></div>
      ${details}
      <div class="card-actions">
        <button type="button" data-action="toggle">${expanded ? "Ocultar" : "Ver notas"}</button>
        <button type="button" data-action="edit">Editar</button>
        <button type="button" data-action="duplicate">Duplicar</button>
        <button type="button" data-action="delete">Excluir</button>
      </div>
    </article>`;
  }).join("");
}

async function uploadLocalItemsToCloud(remoteItems){
  if(state.pendingLocalUploadDone || !state.remoteRef) return;
  state.pendingLocalUploadDone = true;

  const remoteMap = new Map(remoteItems.map(item => [item.id, item]));
  const payload = {};
  loadLocal().forEach(local => {
    if(!local?.id) return;
    const remote = remoteMap.get(local.id);
    if(!remote || Number(local.updatedAt || 0) > Number(remote.updatedAt || 0)){
      payload[local.id] = normalizeItem({...local, schemaVersion: 6});
    }
  });

  if(!Object.keys(payload).length) return;

  try{
    setStatus("busy","Enviando backup local...");
    await update(state.remoteRef, payload);
    setStatus("ok","Sincronizado ✓");
  }catch(err){
    console.warn("Backup local não subiu para a nuvem:", err);
    state.pendingLocalUploadDone = false;
    setStatus("warn", err?.code === "PERMISSION_DENIED" ? "Sem permissão" : "Backup local pendente");
  }
}

async function initFirebase(){
  state.items = mergeItems(loadLocal());
  render();
  setStatus("busy","Conectando Firebase...");

  try{
    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const database = getDatabase(app);
    setPersistence(auth, browserLocalPersistence).catch(console.warn);

    onAuthStateChanged(auth, user => {
      if(!user){
        state.currentUser = null;
        state.remoteRef = null;
        state.remotePath = null;
        setStatus("warn","Faça login");
        showToast("Faça login pelo Hub para sincronizar na nuvem.");
        setTimeout(() => {
          if(!state.currentUser && !location.pathname.endsWith("/index.html")) window.location.href = "../index.html";
        }, 1200);
        return;
      }

      state.currentUser = user;
      state.firebase = {auth, db: database};
      state.remotePath = `users/${user.uid}/modulos/${CONFIG.key}`;
      state.remoteRef = ref(database, state.remotePath);
      state.pendingLocalUploadDone = false;
      setStatus("busy","Carregando nuvem...");

      onValue(state.remoteRef, snapshot => {
        const remoteItems = [];
        snapshot.forEach(child => remoteItems.push({id: child.key, ...child.val()}));

        state.lastRemoteAt = Date.now();
        state.items = mergeItems(loadLocal(), remoteItems);
        saveLocal();
        render();
        setStatus("ok","Sincronizado ✓");
        uploadLocalItemsToCloud(remoteItems);
      }, error => {
        console.error(error);
        state.remoteRef = null;
        setStatus("warn", error?.code === "PERMISSION_DENIED" ? "Sem permissão" : "Offline/erro");
        showToast(error?.code === "PERMISSION_DENIED" ? "Firebase bloqueou. Confira a regra users/{uid}." : "Erro ao sincronizar com Firebase. Mantive o backup local.");
      });
    });
  }catch(err){
    console.warn("Firebase indisponível. Modo local ativo.", err);
    setStatus("warn","Local apenas");
  }
}

function selectionInsideEditor(){
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  const node = range.commonAncestorContainer.nodeType === 1
    ? range.commonAncestorContainer
    : range.commonAncestorContainer.parentElement;
  return node && editor.contains(node) ? range : null;
}
function saveRange(){
  const range = selectionInsideEditor();
  if(range) savedRange = range.cloneRange();
}
function restoreRange(){
  if(savedRange){
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(savedRange);
  }
  editor.focus({preventScroll:true});
}
function execCommand(cmd, value=null){
  restoreRange();
  document.execCommand(cmd, false, value);
  saveRange();
}
function wrapSelection(style){
  restoreRange();
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount || sel.isCollapsed){
    showToast("Selecione um trecho do texto primeiro.");
    return;
  }
  const range = sel.getRangeAt(0);
  const span = document.createElement("span");
  Object.assign(span.style, style);
  try{
    range.surroundContents(span);
  }catch{
    span.appendChild(range.extractContents());
    range.insertNode(span);
  }
  range.selectNodeContents(span);
  sel.removeAllRanges();
  sel.addRange(range);
  savedRange = range.cloneRange();
}
function unwrapResize(wrap){
  const img = wrap.querySelector("img");
  if(!img){
    wrap.remove();
    return;
  }
  img.classList.remove("img-selected");
  wrap.replaceWith(img);
}
function selectImage(img){
  $$(".resize-wrap", editor).forEach(wrap => {
    if(!wrap.contains(img)) unwrapResize(wrap);
  });
  if(img.parentElement?.classList.contains("resize-wrap")) return;

  img.classList.add("img-selected");
  const wrap = document.createElement("span");
  wrap.className = "resize-wrap";
  wrap.contentEditable = "false";
  img.parentNode.insertBefore(wrap, img);
  wrap.appendChild(img);

  const handle = document.createElement("span");
  handle.className = "resize-handle";
  wrap.appendChild(handle);

  let startX = 0;
  let startW = 0;

  const move = ev => {
    ev.preventDefault();
    const x = ev.touches ? ev.touches[0].clientX : ev.clientX;
    img.style.width = Math.max(90, startW + x - startX) + "px";
    img.style.maxWidth = "none";
  };
  const up = () => {
    document.removeEventListener("mousemove", move);
    document.removeEventListener("mouseup", up);
    document.removeEventListener("touchmove", move);
    document.removeEventListener("touchend", up);
  };
  const down = ev => {
    ev.preventDefault();
    ev.stopPropagation();
    startX = ev.touches ? ev.touches[0].clientX : ev.clientX;
    startW = img.offsetWidth;
    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", up);
    document.addEventListener("touchmove", move, {passive:false});
    document.addEventListener("touchend", up);
  };

  handle.addEventListener("mousedown", down);
  handle.addEventListener("touchstart", down, {passive:false});
}
function readFile(file){
  return new Promise((resolve,reject) => {
    const reader = new FileReader();
    reader.onload = ev => resolve(ev.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}
async function optimizeImage(file){
  const original = await readFile(file);
  if(/image\/(gif|svg\+xml)/i.test(file.type)) return original;
  try{
    const img = await loadImage(original);
    const max = 1100;
    const scale = Math.min(1, max / Math.max(img.width, img.height));
    const width = Math.max(1, Math.round(img.width * scale));
    const height = Math.max(1, Math.round(img.height * scale));
    const canvas = document.createElement("canvas");
    canvas.width = width;
    canvas.height = height;
    canvas.getContext("2d", {alpha:true}).drawImage(img, 0, 0, width, height);
    const webp = canvas.toDataURL("image/webp", .76);
    return webp.length < original.length ? webp : original;
  }catch{
    return original;
  }
}
function insertNode(node){
  restoreRange();
  const sel = window.getSelection();
  if(sel && sel.rangeCount){
    const range = sel.getRangeAt(0);
    range.deleteContents();
    range.insertNode(node);
    range.setStartAfter(node);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
    savedRange = range.cloneRange();
  }else{
    editor.appendChild(node);
  }
}
async function insertImages(files){
  const images = files.filter(file => file?.type?.startsWith("image/"));
  if(!images.length) return;

  for(const file of images){
    const img = document.createElement("img");
    img.loading = "lazy";
    img.decoding = "async";
    img.alt = "";
    img.src = await optimizeImage(file);
    insertNode(img);
  }

  showToast(images.length > 1 ? "Imagens inseridas ✓" : "Imagem inserida ✓");
}


function openCaptureModal(){

  if(!overlay) return;
  overlay.classList.add("open");
  document.body.classList.add("modal-open");
  setTimeout(() => $("#itemTitle")?.focus(), 120);
}
function closeCaptureModal(){
  const overlay = $("#captureOverlay");
  if(!overlay) return;
  overlay.classList.remove("open");
  document.body.classList.remove("modal-open");
}

    e.preventDefault();
    addTag();
  }
});
$("#tagChips").addEventListener("click", e => {
  const chip = e.target.closest("[data-tag]");
  if(!chip) return;
  state.tags = state.tags.filter(tag => tag !== chip.dataset.tag);
  renderTags();
});

  state.search = e.target.value;
  render();
});

  const btn = e.target.closest("[data-filter]");
  if(!btn) return;
  state.filter = btn.dataset.filter;
  $$(".filter-btn").forEach(x => x.classList.toggle("active", x === btn));
  render();
});
$("#items").addEventListener("click", async e => {
  const btn = e.target.closest("[data-action]");
  if(!btn) return;

  const card = btn.closest(".item-card");
  const id = card?.dataset.id;
  if(!id) return;

  const action = btn.dataset.action;
  const item = state.items.find(x => x.id === id);

  if(action === "toggle"){
    state.expanded.has(id) ? state.expanded.delete(id) : state.expanded.add(id);
    render();
  }

  if(action === "edit") editItem(id);

  if(action === "duplicate" && item){
    const copy = normalizeItem({
      ...item,
      id: makeId(),
      title: `${item.title} · cópia`,
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
    await saveRemote(copy);
    showToast("Registro duplicado e já visível ✓");
  }

  if(action === "delete" && confirm("Excluir este registro?")){
    await deleteRemote(id);
    showToast("Registro excluído ✓");
  }
});

$("#items").addEventListener("change", e => {
  const input = e.target.closest("[data-subtotal-select]");
  if(!input) return;

  const card = input.closest(".item-card");
  const id = card?.dataset.id;
  if(!id) return;

  if(input.checked) state.selectedSubtotal.add(id);
  else state.selectedSubtotal.delete(id);

  input.closest(".subtotal-selector")?.classList.toggle("selected", input.checked);
  saveSubtotalSelection();
  renderStats([...state.items].sort((a,b) => (b.updatedAt || b.createdAt || 0) - (a.updatedAt || a.createdAt || 0)));
});

editor.addEventListener("keyup", saveRange);
editor.addEventListener("mouseup", saveRange);
editor.addEventListener("input", saveRange);

});

  $("#imgInput").click();
});

editor.addEventListener("paste", e => {
  const items = [...(e.clipboardData?.items || [])];
  const imgs = items.filter(i => i.type.startsWith("image/")).map(i => i.getAsFile()).filter(Boolean);
  if(imgs.length){
    e.preventDefault();
    insertImages(imgs);
  }
});
editor.addEventListener("dragover", e => e.preventDefault());
editor.addEventListener("drop", e => {
  const files = [...(e.dataTransfer?.files || [])].filter(f => f.type.startsWith("image/"));
  if(files.length){
    e.preventDefault();
    insertImages(files);
  }
});
editor.addEventListener("click", e => {
  if(e.target.tagName === "IMG") selectImage(e.target);
  else $$(".resize-wrap", editor).forEach(unwrapResize);
});
